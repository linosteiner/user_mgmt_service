services:
  user-mgmt-service:
    image: xxpirl2knc5/user_mgmt_service:latest
    ports: [ "8080:8080" ]
    depends_on:
      postgres:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_mgmt_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      #      JWT_ISSUER:
      #      JWT_SECRET:
      JWT_EXPIRATION_MILLIS: 3600000

  postgres:
    image: postgres:12.2-alpine
    restart: always
    ports: [ "5432:5432" ]
    volumes:
      - pgdata:/var/lib/postgresql/data
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready" ]
#      interval: 5s
#      timeout: 5s
#      retries: 5
#      start_period: 15s
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: user_mgmt_db

volumes:
  pgdata:

